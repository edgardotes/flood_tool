<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiss Camping Flood Hazard Monitor</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <h1>Swiss Camping Flood Hazard Monitor</h1>
    <p>Phase 2 — Scenario browser for precomputed campsite flood maps</p>
  </header>

  <main class="layout">
    <section class="map-section">
      <div id="map"></div>
    </section>

    <aside class="side-panel">
      <h2 class="panel-title">Site information</h2>
      <div id="panel" class="placeholder">
        Click a campsite marker on the map to load its precomputed flood scenarios.
      </div>
    </aside>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="./app.js"></script>
</body>
</html>
